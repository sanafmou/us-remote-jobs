<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Operations Group Ltd. - Careers</title>
    <style>
        /* Modern reset and fonts */
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* High-quality layout container */
        .job-container {
            display: flex;
            max-width: 850px;
            width: 100%;
            background: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            border: 1px solid #e2e8f0;
        }

        /* Left Branding Panel */
        .left-panel {
            flex: 1;
            background-color: #f0fdf4; /* Very soft premium green */
            padding: 40px 35px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            border-right: 1px solid #e2e8f0;
        }

        .urgent-tag {
            background-color: #ef4444;
            color: #ffffff;
            padding: 6px 14px;
            font-size: 11px;
            font-weight: 700;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            align-self: flex-start;
            margin-bottom: 25px;
        }

        .department-title {
            font-size: 18px;
            color: #2563eb; /* Corporate blue */
            font-weight: 600;
            margin: 0;
        }

        /* Right Content Panel */
        .right-panel {
            flex: 1.6;
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        /* Company branding row */
        .company-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .company-logo {
            width: 48px;
            height: 48px;
            background-color: #2563eb;
            color: #ffffff;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            margin-right: 15px;
        }

        .company-name {
            font-size: 18px;
            font-weight: 700;
            color: #1e293b;
            margin: 0;
        }

        .verified-status {
            font-size: 13px;
            color: #16a34a;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 2px;
            font-weight: 500;
        }

        /* Premium Job Title typography */
        .job-title {
            font-size: 32px;
            color: #0f172a;
            margin: 10px 0 25px 0;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        /* Professional Metadata Tags */
        .tags-wrapper {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 35px;
        }

        .badge {
            background-color: #f1f5f9;
            color: #475569;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid #e2e8f0;
        }

        .badge.green {
            background-color: #ecfdf5;
            color: #065f46;
            border-color: #a7f3d0;
        }

        .badge.purple {
            background-color: #f5f3ff;
            color: #5b21b6;
            border-color: #ddd6fe;
        }

        /* Clean Footer Divider Layout */
        .division-footer {
            border-top: 1px dashed #cbd5e1;
            padding-top: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #64748b;
        }

        .division-footer strong {
            color: #1e293b;
        }

        /* Premium Call-to-Action Button with Icon placement */
        .apply-now-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #16a34a; /* High-conversion green */
            color: #ffffff;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: 700;
            text-decoration: none;
            border-radius: 8px;
            gap: 12px;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 4px 12px rgba(22, 163, 74, 0.15);
        }

        .apply-now-btn:hover {
            background-color: #15803d;
        }

        .apply-now-btn:active {
            transform: scale(0.99);
        }

        /* Styling for the image inside the button */
        .btn-icon-img {
            width: 22px;
            height: 22px;
            object-fit: contain;
        }

        /* Responsive adaptation for small viewports */
        @media (max-width: 650px) {
            .job-container {
                flex-direction: column;
            }
            .left-panel {
                border-right: none;
                border-bottom: 1px solid #e2e8f0;
                padding: 30px;
            }
            .right-panel {
                padding: 30px;
            }
        }
    </style>
</head>
<body>

    <div class="job-container">
        
        <!-- Left Column: Branding details -->
        <div class="left-panel">
            <div class="urgent-tag">Urgent Hiring</div>
            <p class="department-title">Operations Environment</p>
        </div>

        <!-- Right Column: Main Job specifications -->
        <div class="right-panel">
            
            <div class="company-header">
                <div class="company-logo">GO</div>
                <div>
                    <h2 class="company-name">Global Operations Group Ltd.</h2>
                    <div class="verified-status">✓ Verified Employer</div>
                </div>
            </div>

            <h1 class="job-title">Online Remote Assistant</h1>

            <div class="tags-wrapper">
                <span class="badge green">🏡 100% Home Based Job</span>
                <span class="badge">💼 Entry Level Opportunity</span>
                <span class="badge purple">⏱ Flexible Shift</span>
            </div>

            <div class="division-footer">
                <span>Division:</span>
                <span><strong>Administrative & Data Systems</strong></span>
            </div>

            <!-- Premium Button containing your exact tracking link -->
            <a href="https://effectivecpmnetwork.com" class="apply-now-btn" target="_blank">
                <!-- Replace this src placeholder with your actual direct image/icon link if needed -->
                <img src="https://placeholder.com" alt="" class="btn-icon-img">
                Apply Now
            </a>

        </div>

    </div>

</body>
</html>
