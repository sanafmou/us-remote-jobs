<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Portal | Global Operations Group Ltd.</title>
    <style>
        :root {
            --primary-bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --brand-color: #2563eb;
            --brand-hover: #1d4ed8;
            --border-color: #e2e8f0;
            --success: #16a34a;
            --urgent-color: #e63946;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .job-portal-wrapper {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: center;
        }

        .premium-job-card {
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
            width: 100%;
            display: flex;
            overflow: hidden;
        }

        /* Left Side: Media Asset Integration */
        .portal-media-box {
            flex: 1;
            background-color: #f0fdf4;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 25px;
            position: relative;
            border-right: 1px solid var(--border-color);
        }

        .portal-media-box a {
            display: block;
            width: 100%;
            height: 100%;
            text-decoration: none;
        }

        .urgent-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background-color: var(--urgent-color);
            color: #ffffff;
            padding: 5px 12px;
            font-size: 0.75rem;
            font-weight: 700;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 10px rgba(230, 57, 70, 0.2);
            z-index: 5;
        }

        .portal-media-box img {
            width: 100%;
            height: 100%;
            max-height: 380px;
            object-fit: contain;
            border-radius: 12px;
            display: block;
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.04));
            transition: transform 0.2s ease-in-out;
        }

        .portal-media-box img:hover {
            transform: scale(1.02);
        }

        /* Right Side: Information Panel */
        .portal-content-box {
            flex: 1.25;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .portal-click-layer {
            text-decoration: none !important;
            color: inherit !important;
            display: block;
        }

        .portal-header-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .portal-company-logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #3b82f6, var(--brand-color));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 6px rgba(37, 99, 235, 0.2);
        }

        .portal-company-meta {
            display: flex;
            flex-direction: column;
        }

        .portal-company-name {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: 0.3px;
        }

        .portal-verification {
            font-size: 0.75rem;
            color: var(--success);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 1px;
        }

        .portal-job-title {
            font-size: 1.9rem;
            color: var(--text-main);
            font-weight: 800;
            line-height: 1.25;
            margin-bottom: 18px;
            letter-spacing: -0.5px;
        }

        .portal-badge-row {
            display: flex;
            gap: 8px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .portal-badge {
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-success {
            background-color: #f0fdf4;
            color: var(--success);
            border: 1px solid #bbf7d0;
        }

        .badge-neutral {
            background-color: #f1f5f9;
            color: var(--text-muted);
            border: 1px solid #e2e8f0;
        }

        .portal-info-table {
            margin-bottom: 30px;
        }

        .portal-info-row {
            display: flex;
            padding: 10px 0;
            font-size: 0.95rem;
            border-bottom: 1px dashed #e2e8f0;
        }

        .portal-info-row:last-child {
            border-bottom: none;
        }

        .portal-info-label {
            font-weight: 600;
            width: 140px;
            color: #64748b;
            flex-shrink: 0;
        }

        .portal-info-value {
            color: var(--text-main);
            flex: 1;
            font-weight: 500;
        }

        .portal-info-value.salary {
            color: var(--success);
            font-weight: 700;
        }

        .portal-action-btn {
            display: block;
            width: 100%;
            background-color: var(--text-main);
            color: #ffffff !important;
            text-align: center;
            padding: 16px 30px;
            font-size: 1.05rem;
            font-weight: 700;
            border-radius: 10px;
            text-decoration: none !important;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 4px 14px rgba(15, 23, 42, 0.15);
        }

        .portal-action-btn:hover {
            background-color: var(--brand-color);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.25);
        }

        /* Mobile Viewports */
        @media (max-width: 768px) {
            .premium-job-card {
                flex-direction: column;
            }
            .portal-media-box {
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                padding: 30px 20px 20px 20px;
            }
            .portal-media-box img {
                max-height: 250px;
            }
            .portal-content-box {
                padding: 35px 20px;
            }
            .portal-job-title {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
