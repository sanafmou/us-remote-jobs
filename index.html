<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Remote Assistant - Global Operations Group Ltd.</title>
    <style>
        /* Premium Typography from Google Fonts */
        @import url('https://googleapis.com');

        /* Global Page Reset & Smooth Dark Background */
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #090d16; /* Deep midnight black */
            color: #c9d1d9; /* Clean subtle gray text */
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Large Premium Card Container */
        .main-job-portal {
            max-width: 900px;
            width: 100%;
            background: #111625; /* Sleek contrast dark panel */
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.6);
            border: 1px solid #1f293d; /* Subtle glow border */
        }

        /* Top Header Split Layout (2 Columns) */
        .portal-header {
            display: flex;
            border-bottom: 1px solid #1f293d;
        }

        /* Left Side Branding Panel */
        .brand-left-panel {
            flex: 1;
            background-color: #0e1e25; /* Premium dark emerald/teal tint */
            padding: 45px 35px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            border-right: 1px solid #1f293d;
        }

        /* Glowing Urgent Hiring Tag */
        .urgent-tag-glow {
            background: linear-gradient(135deg, #ef4444, #b91c1c);
            color: #ffffff;
            padding: 6px 14px;
            font-size: 11px;
            font-weight: 700;
            border-radius: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
            align-self: flex-start;
            margin-bottom: 25px;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
        }

        .environment-txt {
            font-size: 19px;
            color: #38bdf8; /* Vibrant neon cyan */
            font-weight: 700;
            margin: 0;
            line-height: 1.4;
        }

        /* Right Side Primary Info Panel */
        .info-right-panel {
            flex: 1.6;
            padding: 45px;
            display: flex;
            flex-direction: column;
        }

        /* Corporate Company Info Row */
        .company-identity-row {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .logo-avatar-box {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #38bdf8, #0369a1);
            color: #ffffff;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 20px;
            margin-right: 18px;
            box-shadow: 0 4px 20px rgba(56, 189, 248, 0.3);
        }

        .company-name-text h2 {
            font-size: 19px;
            font-weight: 700;
            color: #f8fafc;
            margin: 0;
        }

        .verified-employer-check {
            font-size: 13px;
            color: #4ade80; /* Radiant neon green */
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 4px;
            font-weight: 600;
        }

        /* Cinematic Big Job Title */
        .cinematic-job-title {
            font-size: 36px;
            color: #ffffff;
            margin: 5px 0 25px 0;
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1.2;
        }

        /* Modern Tech Pills / Tags */
        .meta-tags-grid {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .premium-pill {
            background-color: #1e293b;
            color: #94a3b8;
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid #334155;
        }

        .premium-pill.active-green {
            background-color: rgba(74, 222, 128, 0.1);
            color: #4ade80;
            border-color: rgba(74, 222, 128, 0.3);
        }

        .premium-pill.active-purple {
            background-color: rgba(192, 132, 252, 0.1);
            color: #c084fc;
            border-color: rgba(192, 132, 252, 0.3);
        }

        /* Division Information Bar */
        .division-info-grid {
            border-top: 1px dashed #334155;
            padding-top: 18px;
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #94a3b8;
        }

        .division-info-grid strong {
            color: #ffffff;
            font-weight: 700;
        }

        /* --- BIG PAGE DETAILS SECTION --- */
        .portal-body-details {
            padding: 45px;
            background-color: #131a2e; /* Deep content container color */
        }

        .details-block {
            margin-bottom: 35px;
        }

        .details-block h3 {
            font-size: 18px;
            color: #ffffff;
            margin-top: 0;
            margin-bottom: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            border-left: 4px solid #38bdf8;
            padding-left: 10px;
        }

        .details-block p {
            font-size: 15px;
            line-height: 1.7;
            color: #94a3b8;
            margin: 0;
        }

        .details-block ul {
            padding-left: 20px;
            margin: 0;
        }

        .details-block li {
            font-size: 15px;
            line-height: 1.8;
            color: #94a3b8;
            margin-bottom: 10px;
        }

        /* --- HIGH QUALITY CONVERSION ACTION BUTTON --- */
        .cta-action-container {
            margin-top: 40px;
            text-align: center;
        }

        .ultra-apply-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            background: linear-gradient(135deg, #10b981, #059669); /* High converting emerald gradient */
            color: #ffffff;
            padding: 18px 40px;
            font-size: 20px;
            font-weight: 700;
            text-decoration: none;
            border-radius: 16px;
            gap: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-sizing: border-box;
            letter-spacing: 0.5px;
        }

        .ultra-apply-button:hover {
            background: linear-gradient(135deg, #059669, #047857);
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(16, 185, 129, 0.5);
        }

        .ultra-apply-button:active {
            transform: translateY(-1px);
        }

        /* Sparkle Icon placement inside button */
        .button-sparkle-icon {
            width: 24px;
            height: 24px;
            object-fit: contain;
        }

        /* Full Responsive Adaptability */
        @media (max-width: 720px) {
            .portal-header {
                flex-direction: column;
            }
            .brand-left-panel {
                border-right: none;
                border-bottom: 1px solid #1f293d;
                padding: 35px 25px;
            }
            .info-right-panel, .portal-body-details {
                padding: 35px 25px;
            }
            .cinematic-job-title {
                font-size: 30px;
            }
        }
    </style>
</head>
<body>

    <div class="main-job-portal">
        
        <!-- Top Half: Header Layout Matching Your Layout Concept -->
        <div class="portal-header">
            
            <!-- Left Grid Split -->
            <div class="brand-left-panel">
                <div class="urgent-tag-glow">Urgent Hiring</div>
                <p class="environment-txt">Operations Environment</p>
            </div>

            <!-- Right Grid Split -->
            <div class="info-right-panel">
                
                <!-- Verified Brand Row -->
                
                    <div class="logo-avatar-box">GO</div>
                    <div class="company-name-text">
                        <h2>Global Operations Group Ltd.</h2>
                        <div class="verified-employer-check">✓ Verified Employer</div>
                    </div>
                </div>

                <!-- Big Title Banner -->
                <h1 class="cinematic-job-title">Online Remote Assistant</h1>

                <!-- Professional Status Pills -->
                <div class="meta-tags-grid">
                    <span class="premium-pill active-green">🏡 100% Home Based Job</span>
                    <span class="premium-pill">💼 Entry Level Opportunity</span>
                    <span class="premium-pill active-purple">⏱ Flexible Shift</span>
                </div>

                <!-- Secondary Metadata -->
                <div class="division-info-grid">
                    <span>Division:</span>
                    <span><strong>Administrative & Data Systems</strong></span>
                </div>

            </div>

        </div>

        <!-- Bottom Half: Extended Real-Looking Job Details Descriptions -->
        <div class="portal-body-details">
