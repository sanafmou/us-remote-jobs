<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Portal | Lakshyan Academy of Sports</title>
    <style>
        :root {
            --primary-bg: #0b0f17;
            --card-bg: #121824;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --brand-color: #f59e0b;
            --brand-hover: #d97706;
            --border-color: #1e293b;
            --urgent-color: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .job-portal-wrapper {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: center;
        }

        .premium-job-card {
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            width: 100%;
            display: flex;
            overflow: hidden;
        }

        /* Left Side: Real Real Estate/Premium Workspace Look */
        .portal-media-box {
            flex: 1.1;
            background-color: #0b0f17;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            position: relative;
        }

        .portal-media-box a {
            display: block;
            width: 100%;
            height: 100%;
            text-decoration: none;
        }

        .urgent-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: var(--urgent-color);
            color: #ffffff;
            padding: 6px 14px;
            font-size: 0.75rem;
            font-weight: 800;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
            z-index: 5;
        }

        /* Dark Premium Shadow Overlay on Image */
        .portal-media-box ::after {
            content: '';
            position: absolute;
            left: 0; top: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, rgba(11, 15, 23, 0) 70%, rgba(18, 24, 36, 1) 100%);
            pointer-events: none;
        }

        .portal-media-box img {
            width: 100%;
            height: 100%;
            min-height: 450px;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease-in-out;
        }

        .portal-media-box img:hover {
            transform: scale(1.03);
        }

        /* Right Side: Dark Elegant Text Framework */
        .portal-content-box {
            flex: 1.25;
            padding: 45px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .portal-click-layer {
            text-decoration: none !important;
            color: inherit !important;
            display: block;
        }

        .portal-header-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .portal-company-logo {
            width: 44px;
            height: 44px;
            background: #ffffff;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000000;
            font-weight: 800;
            font-size: 1.1rem;
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
        }

        .portal-company-meta {
            display: flex;
            flex-direction: column;
        }

        .portal-company-name {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: 0.3px;
        }

        .portal-verification {
            font-size: 0.8rem;
            color: var(--brand-color);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 2px;
        }

        .portal-job-title {
            font-size: 2.2rem;
            color: var(--text-main);
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }

        .portal-badge-row {
            display: flex;
            gap: 8px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .portal-badge {
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-brand {
            background-color: rgba(245, 158, 11, 0.1);
            color: var(--brand-color);
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .badge-neutral {
            background-color: #1e293b;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }

        /* Requirements Pills Matching Your Image Style */
        .requirement-pill {
            display: block;
            width: 100%;
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            font-size: 0.95rem;
            color: #e2e8f0;
            margin-bottom: 10px;
            font-weight: 500;
            text-align: center;
            letter-spacing: 0.3px;
        }

        .portal-info-table {
            margin-bottom: 30px;
            margin-top: 10px;
        }

        .portal-info-row {
            display: flex;
            padding: 12px 0;
            font-size: 0.95rem;
            border-bottom: 1px dashed var(--border-color);
        }

        .portal-info-row:last-child {
            border-bottom: none;
        }

        .portal-info-label {
            font-weight: 600;
            width: 140px;
            color: #64748b;
            flex-shrink: 0;
        }

        .portal-info-value {
            color: #cbd5e1;
            flex: 1;
            font-weight: 500;
        }

        .portal-action-btn {
            display: block;
            width: 100%;
            background-color: #ffffff;
            color: #000000 !important;
            text-align: center;
            padding: 16px 30px;
            font-size: 1.05rem;
            font-weight: 700;
            border-radius: 8px;
            text-decoration: none !important;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 4px 14px rgba(255, 255, 255, 0.1);
        }

        .portal-action-btn:hover {
            background-color: var(--brand-color);
            color: #ffffff !important;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(245, 158, 11, 0.4);
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .premium-job-card {
                flex-direction: column;
            }
            .portal-media-box {
                border-right: none;
                padding: 0;
            }
            .portal-media-box img {
                min-height: 280px;
                max-height: 320px;
            }
            .portal-media-box ::after {
                background: linear-gradient(to bottom, rgba(11, 15, 23, 0) 60%, rgba(18, 24, 36, 1) 100%);
            }
            .portal-content-box {
                padding: 35px 24px;
            }
            .portal-job-title {
                font-size: 1.8rem;
            }
        }
    </style>
</head>

            <div class="portal-media-box">

                        <div class="portal-company-meta">

                            </span>
